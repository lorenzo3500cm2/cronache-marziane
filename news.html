<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Cronache Marziane</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Libre Baskerville", Georgia, serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 28px 36px;
      background-color: #ffffff;
    }

    .site-title {
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.3px;
    }

    nav a {
      margin-left: 22px;
      text-decoration: none;
      color: #000000;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 70px 36px 80px 36px;
      max-width: 1100px;
    }

    h1 {
      font-size: 46px;
      font-weight: 400;
      line-height: 1.1;
      margin: 0 0 70px 0;
      letter-spacing: -1px;
    }

    .news-item {
      max-width: 780px;
      margin-bottom: 70px;
    }

    .news-category {
      font-size: 15px;
      margin-bottom: 14px;
    }

    .news-title {
      font-size: 34px;
      font-weight: 400;
      line-height: 1.15;
      margin: 0 0 24px 0;
      letter-spacing: -0.6px;
    }

    .news-info {
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }

    .arrow {
      display: inline-block;
      margin-right: 8px;
    }

    footer {
      padding: 24px 36px;
      font-size: 13px;
      background-color: #ffffff;
    }

    @media (max-width: 800px) {
      header {
        display: block;
        padding: 22px;
      }

      .site-title {
        font-size: 24px;
      }

      nav {
        margin-top: 18px;
      }

      nav a {
        display: block;
        margin: 8px 0;
        font-size: 14px;
      }

      main {
        padding: 46px 22px 60px 22px;
      }

      h1 {
        font-size: 34px;
        margin-bottom: 50px;
      }

      .news-title {
        font-size: 28px;
      }

      .news-info {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="site-title">Cronache Marziane</div>

    <nav>
      <a href="index.html">Home</a>
      <a href="chi-siamo.html">Chi siamo</a>
      <a href="attivita.html">Attività</a>
      <a href="progetti.html">Progetti</a>
      <a href="musica.html">Musica</a>
      <a href="news.html">News</a>
      <a href="contatti.html">Contatti</a>
    </nav>
  </header>

  <main>
    <h1>News</h1>

    <article class="news-item">
      <div class="news-category">Mostre / Arte</div>

      <h2 class="news-title">Prequel</h2>

      <p class="news-info">
        <strong>Dove</strong><br>
        <span class="arrow">⟶</span> Spazio Supernova
      </p>
    </article>

  </main>

  <footer>
    © Cronache Marziane — Associazione culturale
  </footer>

</body>
</html>
